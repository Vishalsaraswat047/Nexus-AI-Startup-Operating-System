<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding | Nexus AI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "#f9f9f9",
                        "primary-fixed-dim": "#bec6e0",
                        "tertiary-fixed-dim": "#c5c7c8",
                        "surface-dim": "#dadada",
                        "inverse-on-surface": "#f0f1f1",
                        "on-secondary-fixed": "#07006c",
                        "tertiary": "#000000",
                        "secondary": "#4648d4",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "surface-tint": "#565e74",
                        "surface-container-high": "#e8e8e8",
                        "on-secondary-container": "#fffbff",
                        "on-tertiary": "#ffffff",
                        "on-background": "#1a1c1c",
                        "outline-variant": "#c6c6cd",
                        "surface-container": "#eeeeee",
                        "on-error-container": "#93000a",
                        "on-secondary-fixed-variant": "#2f2ebe",
                        "primary-fixed": "#dae2fd",
                        "surface-variant": "#e2e2e2",
                        "on-primary-fixed": "#131b2e",
                        "outline": "#76777d",
                        "surface-container-low": "#f3f3f4",
                        "secondary-fixed-dim": "#c0c1ff",
                        "error": "#ba1a1a",
                        "on-tertiary-fixed-variant": "#444749",
                        "on-tertiary-fixed": "#191c1e",
                        "background": "#f9f9f9",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed": "#e1e2e4",
                        "primary-container": "#131b2e",
                        "on-primary-fixed-variant": "#3f465c",
                        "on-surface": "#1a1c1c",
                        "inverse-surface": "#2f3131",
                        "secondary-container": "#6063ee",
                        "on-tertiary-container": "#828486",
                        "on-surface-variant": "#45464d",
                        "primary": "#000000",
                        "tertiary-container": "#191c1e",
                        "on-primary": "#ffffff",
                        "surface-container-highest": "#e2e2e2",
                        "surface-bright": "#f9f9f9",
                        "on-primary-container": "#7c839b",
                        "inverse-primary": "#bec6e0",
                        "secondary-fixed": "#e1e0ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-md": "16px",
                        "gutter": "24px",
                        "sidebar-width": "220px",
                        "stack-sm": "8px",
                        "stack-lg": "32px",
                        "margin-page": "40px",
                        "container-max": "1440px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "body-sm": ["Inter"],
                        "label-sm": ["Inter"],
                        "label-md": ["Inter"],

                        "headline-xl": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-lg": ["Inter"]
                    },
                    "fontSize": {

                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],

                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "headline-xl": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; background-color: #f9f9f9; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px) saturate(1.6);
            -webkit-backdrop-filter: blur(20px) saturate(1.6);
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center p-gutter overflow-hidden">
<!-- Subtle Background Elements -->
<div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
<div class="absolute -top-[10%] -left-[5%] w-[40%] h-[40%] bg-secondary/5 rounded-full blur-[120px]"></div>
<div class="absolute -bottom-[10%] -right-[5%] w-[30%] h-[30%] bg-primary-fixed-dim/10 rounded-full blur-[100px]"></div>
</div>
<!-- Onboarding Container -->
<main class="relative z-10 w-full max-w-[640px] flex flex-col gap-stack-lg">
<!-- Header & Progress -->
<header class="flex flex-col gap-stack-md text-center">
<div class="flex flex-col items-center gap-stack-sm mb-4">
<div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center mb-2">
<span class="material-symbols-outlined text-white text-[28px]" data-icon="auto_awesome">auto_awesome</span>
</div>
<h1 class="font-headline-md text-headline-md text-primary tracking-tight">Nexus AI</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant max-w-sm mx-auto">Configure your autonomous operating system environment to begin.</p>
</div>
<!-- Progress Bar -->
<div class="w-full h-1 bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-primary transition-all duration-700 ease-out" id="progress-bar" style="width: 33.33%;"></div>
</div>
<div class="flex justify-between px-1">
<span class="font-label-md text-label-md text-primary">Identity</span>
<span class="font-label-md text-label-md text-on-surface-variant opacity-40">Framework</span>
<span class="font-label-md text-label-md text-on-surface-variant opacity-40">Deployment</span>
</div>
</header>
<!-- Main Form Card -->
<section class="bg-surface-container-lowest border border-outline-variant rounded-xl p-stack-lg shadow-[0px_4px_20px_rgba(0,0,0,0.03)]">
<form class="flex flex-col gap-stack-lg" id="onboarding-form">
<!-- Business Name -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-md text-label-md text-on-surface-variant" for="business_name">Business Name</label>
<input class="h-[48px] px-4 bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/10 focus:border-primary transition-all duration-200 outline-none font-body-md text-body-md" id="business_name" name="business_name" placeholder="Acme Corp AI" required="" type="text"/>
</div>
<!-- Industry -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-md text-label-md text-on-surface-variant" for="industry">Industry</label>
<div class="relative group">
<select class="w-full h-[48px] px-4 bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/10 focus:border-primary transition-all duration-200 outline-none font-body-md text-body-md appearance-none cursor-pointer" id="industry" name="industry" required="">
<option disabled="" selected="" value="">Select industry vertical</option>
<option value="fintech">FinTech &amp; Asset Management</option>
<option value="saas">Software as a Service</option>
<option value="logistics">Logistics &amp; Supply Chain</option>
<option value="healthcare">Healthcare Intelligence</option>
<option value="other">Other / Multi-Sector</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- Primary Goal -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-md text-label-md text-on-surface-variant">Primary Goal</label>
<div class="grid grid-cols-1 gap-3">
<label class="flex items-center gap-4 p-4 border border-outline-variant rounded-lg cursor-pointer hover:bg-surface-container-low transition-colors group">
<input checked="" class="w-4 h-4 text-primary focus:ring-primary border-outline-variant" name="goal" type="radio" value="automation"/>
<div class="flex flex-col">
<span class="font-body-md text-body-md font-semibold text-primary">Workflow Automation</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">Automate repetitive operational tasks across departments.</span>
</div>
</label>
<label class="flex items-center gap-4 p-4 border border-outline-variant rounded-lg cursor-pointer hover:bg-surface-container-low transition-colors group">
<input class="w-4 h-4 text-primary focus:ring-primary border-outline-variant" name="goal" type="radio" value="analytics"/>
<div class="flex flex-col">
<span class="font-body-md text-body-md font-semibold text-primary">Strategic Analytics</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">Deep-dive insights and predictive market forecasting.</span>
</div>
</label>
<label class="flex items-center gap-4 p-4 border border-outline-variant rounded-lg cursor-pointer hover:bg-surface-container-low transition-colors group">
<input class="w-4 h-4 text-primary focus:ring-primary border-outline-variant" name="goal" type="radio" value="workforce"/>
<div class="flex flex-col">
<span class="font-body-md text-body-md font-semibold text-primary">AI Workforce</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">Deploy autonomous agents to handle client support.</span>
</div>
</label>
</div>
</div>
<!-- Action Button -->
<button class="mt-4 w-full h-[56px] bg-primary text-on-primary font-label-md text-label-md rounded-lg hover:bg-on-surface-variant transition-all duration-200 active:scale-[0.98] flex items-center justify-center gap-2 group" type="submit">
                    Initialize Configuration
                    <span class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
</section>
<!-- Footer Info -->
<footer class="flex items-center justify-between text-on-surface-variant px-2">
<p class="font-body-sm text-body-sm">Growth Stage: Alpha</p>
<div class="flex items-center gap-4">
<a class="font-body-sm text-body-sm hover:text-primary transition-colors" href="#">Privacy</a>
<a class="font-body-sm text-body-sm hover:text-primary transition-colors" href="#">Support</a>
</div>
</footer>
</main>
<!-- Interactive Layer -->
<script>
        document.getElementById('onboarding-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalContent = btn.innerHTML;
            
            // Interaction Feedback
            btn.disabled = true;
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span> Syncing Nexus Core...`;
            
            document.getElementById('progress-bar').style.width = '66.66%';
            
            setTimeout(() => {
                btn.innerHTML = `<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span> Success`;
                btn.classList.replace('bg-primary', 'bg-secondary');
                
                setTimeout(() => {
                    alert('Configuration synchronized. Proceeding to Framework step.');
                    btn.disabled = false;
                    btn.innerHTML = originalContent;
                    btn.classList.replace('bg-secondary', 'bg-primary');
                }, 1000);
            }, 2000);
        });

        // Hover effect for progress bar
        const progressBar = document.getElementById('progress-bar');
        setInterval(() => {
            progressBar.style.opacity = '0.8';
            setTimeout(() => { progressBar.style.opacity = '1'; }, 1000);
        }, 2000);
    </script>
</body></html>
